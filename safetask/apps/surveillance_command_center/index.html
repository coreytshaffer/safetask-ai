<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SafeTask AI — Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#0a192f',
            accent: '#00f2fe'
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "zustand": "https://esm.sh/zustand@4.5.2?deps=react@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.368.0?deps=react@18.3.1"
    }
  }
  </script>
</head>
<body class="bg-brand text-gray-200">
  <div id="root"></div>

  <!-- Tell Babel to ONLY transform JSX, leaving ESM import/export intact for the browser -->
  <script type="text/babel" data-type="module" data-presets="react" src="./App.jsx"></script>
</body>
</html>
